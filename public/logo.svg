<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4285F4"/>
      <stop offset="100%" stop-color="#1A73E8"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34A853"/>
      <stop offset="100%" stop-color="#1E8E3E"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000030"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Envelope body (white) -->
  <rect x="72" y="168" width="368" height="240" rx="18" fill="white" opacity="0.97"/>

  <!-- Envelope flap / chevron -->
  <polyline points="72,186 256,302 440,186"
    fill="none" stroke="#4285F4" stroke-width="14"
    stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Envelope bottom folds -->
  <line x1="72" y1="408" x2="196" y2="296"
    stroke="#E8F0FE" stroke-width="9" stroke-linecap="round"/>
  <line x1="440" y1="408" x2="316" y2="296"
    stroke="#E8F0FE" stroke-width="9" stroke-linecap="round"/>

  <!-- Green backup badge circle -->
  <circle cx="385" cy="152" r="72" fill="url(#badgeGrad)"/>

  <!-- Backup / cloud-upload icon inside badge -->
  <!-- Up arrow shaft -->
  <line x1="385" y1="182" x2="385" y2="122"
    stroke="white" stroke-width="12" stroke-linecap="round"/>
  <!-- Arrow head -->
  <polyline points="358,147 385,118 412,147"
    fill="none" stroke="white" stroke-width="12"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Base / storage bar -->
  <line x1="358" y1="188" x2="412" y2="188"
    stroke="white" stroke-width="10" stroke-linecap="round"/>
</svg>
